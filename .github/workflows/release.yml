name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run tests
        run: go test -short ./...

      - name: Build all platforms
        run: task build VERSION=${GITHUB_REF_NAME}

      - name: Generate checksums
        run: |
          sha256sum cartograph-linux-amd64 \
                    cartograph-linux-arm64 \
                    cartograph-darwin-arm64 \
                    cartograph-windows-amd64.exe \
            > checksums-sha256.txt

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            cartograph-linux-amd64
            cartograph-linux-arm64
            cartograph-darwin-arm64
            cartograph-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cartograph-linux-amd64
            cartograph-linux-arm64
            cartograph-darwin-arm64
            cartograph-windows-amd64.exe
            checksums-sha256.txt
