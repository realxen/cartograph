name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '1'
      CC: zig cc
      CXX: zig c++
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build native embedding prereqs
        run: task build:embedding:lib

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Run tests
        run: go test -short ./...

      - name: Build all platforms
        run: task build VERSION=${GITHUB_REF_NAME}

      - name: Generate checksums
        run: |
          sha256sum cartograph-linux-amd64 \
                    cartograph-linux-arm64 \
                    cartograph-darwin-amd64 \
                    cartograph-darwin-arm64 \
                    cartograph-windows-amd64.exe \
            > checksums-sha256.txt

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            cartograph-linux-amd64
            cartograph-linux-arm64
            cartograph-darwin-amd64
            cartograph-darwin-arm64
            cartograph-windows-amd64.exe

      - name: Extract tag annotation
        run: |
          # Extract raw tag message (preserves markdown ## headers that
          # git's %(contents) format functions strip as comments).
          # Skip the object header lines, keep everything after the first blank line.
          git cat-file tag "${GITHUB_REF_NAME}" | sed '1,/^$/d' > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            cartograph-linux-amd64
            cartograph-linux-arm64
            cartograph-darwin-amd64
            cartograph-darwin-arm64
            cartograph-windows-amd64.exe
            checksums-sha256.txt
